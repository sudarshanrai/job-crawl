name: AI Job Search (Every 2 Hours)

on:
  schedule:
    - cron: '0 9-17/2 * * *'
  workflow_dispatch:

jobs:
  scrape_and_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Restore the list of seen jobs from the previous run
      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: job-cache-${{ github.run_id }}
          restore-keys: |
            job-cache-

      - name: Install dependencies
        run: |
          pip install scrapegraphai playwright resend
          playwright install chromium

      - name: Run Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scraper.py

      # Save the updated list back to the cache for the next run
      - name: Save updated cache
        uses: actions/cache/save@v4
        with:
          path: seen_jobs.json
          key: job-cache-${{ github.run_id }}
