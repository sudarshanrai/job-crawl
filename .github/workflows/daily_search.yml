name: Job Search Scraper (Every 2 Hours)

on:
  schedule:
    # Runs every 2 hours from 9 AM to 5 PM
    - cron: '0 9-17/2 * * *'
  workflow_dispatch:

jobs:
  scrape_and_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Restore the list of seen jobs from the previous run
      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          # Using run_id for the key ensures we can save a new version 
          # while restore-keys gets the most recent previous one.
          key: job-cache-${{ github.run_id }}
          restore-keys: |
            job-cache-

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 resend
          # Install the browser engine and its system dependencies
          playwright install chromium
          playwright install-deps chromium

      - name: Run Scraper
        env:
          # You no longer need GEMINI_API_KEY if using the standard scraper, 
          # but keep it if you plan to use AI for specific tasks.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scraper.py

      # Save the updated list back to the cache for the next run
      - name: Save updated cache
        if: always() # Ensure cache saves even if a later step fails
        uses: actions/cache/save@v4
        with:
          path: seen_jobs.json
          key: job-cache-${{ github.run_id }}
