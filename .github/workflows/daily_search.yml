name: Job Search Scraper (Every 2 Hours)

on:
  schedule:
    # Runs every 2 hours from 9 AM to 5 PM
    - cron: '0 9-17/2 * * *'
  workflow_dispatch:

# REQUIRED: This gives the action permission to push changes back to your repo
permissions:
  contents: write

jobs:
  scrape_and_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Ensures we have the full history to allow pushing changes
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 resend
          playwright install chromium
          playwright install-deps chromium

      - name: Run Scraper
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          
          # Only commit and push if the file actually changed
          if git diff --staged --quiet; then
            echo "No new jobs found. Skipping commit."
          else
            git commit -m "Update seen_jobs.json [skip ci]"
            git push
          fi
