name: AI Job Scraper

on:
  schedule:
    # Runs every 6 hours (Adjust the cron expression as needed)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python: '3.11'
        cache: 'pip' # Caching pip speeds up subsequent runs

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: |
        # Installs system dependencies and Chromium binary required for headless scraping
        playwright install chromium --with-deps

    - name: Run Scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      run: python scraper.py

    - name: Commit and Push Updated Cache
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add seen_jobs.json
        # Only commit if the cache file actually changed
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update seen jobs cache [skip ci]" && git push)
